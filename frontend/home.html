<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard · CyberAware</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
    --na-950: #060c1f;
    --na-900: #0b1330;
    --na-800: #121b3d;
    --na-700: #1c2a55;
    --bl-600: #2f6fed;
    --bl-700: #2459cc;
    --bl-100: #e8effe;
    --sl-50: #f3f5fa;
    --sl-100: #eef1f7;
    --sl-200: #e1e6ef;
    --sl-300: #cbd3e1;
    --sl-500: #6b7589;
    --sl-700: #384258;
    --sl-900: #161d2e;
    --radius-lg: 18px;
    --radius-md: 12px;
    --shadow-sm: 0 1px 2px rgba(15, 23, 42, .06);
    --shadow-md: 0 10px 28px rgba(15, 23, 42, .08);
    --shadow-lg: 0 18px 44px rgba(15, 23, 42, .14);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Inter", "Segoe UI", sans-serif;
}

body {
    background: var(--sl-50);
    padding: 32px 40px 60px;
    color: var(--sl-900);
    -webkit-font-smoothing: antialiased;
}

h1, h2 {
    font-family: "Sora", "Segoe UI", sans-serif;
}


/* Dashboard Cards */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.card {
    position: relative;
    background: white;
    padding: 26px 22px 22px;
    border-radius: var(--radius-lg);
    text-align: center;
    border: 1px solid var(--sl-200);
    border-top: 3px solid var(--bl-600);
    box-shadow: var(--shadow-md);
    transition: transform .18s ease, box-shadow .18s ease;
}

.card::before {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--bl-100);
    font-size: 18px;
    margin: 0 auto 14px;
}

.card:nth-of-type(1)::before { content: '👥'; }
.card:nth-of-type(2)::before { content: '📝'; }
.card:nth-of-type(3)::before { content: '🏆'; }
.card:nth-of-type(4)::before { content: '📊'; }

.card:hover {
    transform: translateY(-5px);
    box-shadow: var(--shadow-lg);
}

.card h2 {
    font-size: 34px;
    font-weight: 700;
    color: var(--na-900);
    margin-bottom: 8px;
}

.card p {
    color: var(--sl-500);
    font-size: 12.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .05em;
}

/* Table Section */
.table-section {
    background: white;
    padding: 0;
    border-radius: var(--radius-lg);
    overflow: hidden;
    border: 1px solid var(--sl-200);
    box-shadow: var(--shadow-lg);
}

.table-section h2 {
    margin-bottom: 0;
    color: white;
    background: linear-gradient(135deg, var(--na-900), var(--na-700));
    padding: 22px 26px;
    font-size: 17px;
    font-weight: 600;
}

.users-table {
    width: calc(100% - 40px);
    margin: 20px;
    border-collapse: collapse;
}

.users-table th {
    background: var(--sl-50);
    color: var(--sl-700);
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .05em;
    padding: 14px 16px;
    text-align: left;
    border-bottom: 2px solid var(--sl-200);
}

.users-table td {
    padding: 14px 16px;
    border-bottom: 1px solid var(--sl-100);
    font-size: 14px;
    color: var(--sl-700);
}

.users-table tbody tr:last-child td {
    border-bottom: none;
}

.users-table tr:hover {
    background: var(--bl-100);
}

/* Responsive */
@media(max-width:768px) {
    body {
        padding: 20px;
    }
    .users-table {
        font-size: 13px;
    }
}


.container {
    display: flex;
    width: 100%;
    height: 100vh;
    padding-top: var(--navbar-height);
}

/* Sidebar Navigation */
.sidebar {
    width: 250px;
    height: 100%;
    background: #111827;
    backdrop-filter: blur(10px);
    border-radius: 20px;
    -webkit-backdrop-filter: blur(10px);
    border-right: 1px solid var(--border-color);
    padding: 30px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex-shrink: 0;
    overflow-y: auto;
}

.menu-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 8px;
    padding: 12px 16px;
    color: white;
    font-family: var(--font-body);
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    text-align: left;
    transition: var(--transition-smooth);
}

.menu-btn svg {
    width: 18px;
    height: 18px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    transition: var(--transition-smooth);
}

.menu-btn:hover {
    background: rgba(59, 107, 217, 0.547);
    color: #ffffff;
    border-color: rgba(255, 255, 255, 0.04);
    transform: translateX(4px);
}

.menu-btn.active {
    background: rgba(0, 238, 255, 0.74);
    color: var(--color-primary);
    border-color: rgba(0, 240, 255, 0.15);
    border-left: 4px solid var(--color-primary);
    box-shadow: 0 0 15px rgba(0, 240, 255, 0.05);
}

.menu-btn.logout {
    margin-top: auto;
    color: white;
}

.menu-btn.logout:hover {
    background: rgba(188, 11, 11, 0.588);
    color: var(--color-danger);
    border-color: rgba(239, 68, 68, 0.2);
}

/* Content Frame Main View */
.content {
    flex-grow: 1;
    height: 100%;
    padding: 24px;
    background: var(--bg-darker);
    overflow: hidden;
}

.mainframe-wrapper {
    width: 100%;
    height: 100%;

    border: 1px solid var(--border-color);
    background: rgba(16, 23, 41, 0.25);
    backdrop-filter: blur(10px);
    overflow: hidden;
    position: relative;
    box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.3);
}

/* Custom Neon Frame Indicator Overlay */
.mainframe-wrapper::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    border-radius: 16px;
    border: 1px solid rgba(0, 240, 255, 0.05);
    pointer-events: none;
    z-index: 10;
}

#contentFrame {
    width: 100%;
    height: 100%;
    display: block;
    background: transparent;
}

/* ==========================================
RESPONSIVE LAYOUT MEDIA QUERIES
========================================== */
@media (max-width: 900px) {
    .sidebar {
        width: 70px;
        padding: 30px 10px;
        align-items: center;
    }

    .menu-btn {
        padding: 12px;
        justify-content: center;
        width: 46px;
        height: 46px;
        border-radius: 50%;
    }

    .menu-btn span {
        display: none;
        /* Hide button text labels */
    }

    .menu-btn:hover {
        transform: none;
    }

    .menu-btn.active {
        border-left: 1px solid rgba(0, 240, 255, 0.15);
        /* Re-adjust border */
    }
}
    </style>
</head>
<body>

    <div class="cards">

        <div class="card">
            <h2 id="usersCount">0</h2>
            <p>Total Users</p>
        </div>

        <div class="card">
            <h2 id="attemptsCount">0</h2>
            <p>Quiz Attempts</p>
        </div>

        <div class="card">
            <h2 id="highestScore">0%</h2>
            <p>Highest Score</p>
        </div>

        <div class="card">
            <h2 id="averageScore">0%</h2>
            <p>Average Score</p>
        </div>

    </div>

    <div class="table-section">

        <h2>Registered Users</h2>

        <table class="users-table">

            <thead>
                <tr>
                    <th>UID</th>
                    <th>Full Name</th>
                    <th>Email</th>
                </tr>
            </thead>

            <tbody id="usersTableBody">
            </tbody>

        </table>

    </div>

<script>
async function loadStats() {

    try {

        const response =
            await fetch(
                "http://localhost:5250/api/admin/stats"
            );

        const data =
            await response.json();

        document.getElementById(
            "usersCount"
        ).textContent =
            data.totalUsers;

        document.getElementById(
            "attemptsCount"
        ).textContent =
            data.totalAttempts;

        document.getElementById(
            "highestScore"
        ).textContent =
            data.highestScore + "%";

        document.getElementById(
            "averageScore"
        ).textContent =
            data.averageScore + "%";

    } catch (error) {

        console.error(error);

    }

}

loadStats();

async function loadUsers() {

    try {

        const response = await fetch(
            "http://localhost:5250/api/admin/users"
        );

        const users = await response.json();

        const tbody =
            document.getElementById(
                "usersTableBody"
            );

        tbody.innerHTML = "";

        users.forEach(user => {

            tbody.innerHTML += `
                <tr>
                    <td>${user.uid}</td>
                    <td>${user.full_name}</td>
                    <td>${user.email}</td>
                </tr>
            `;

        });

    } catch (error) {

        console.error(error);

    }

}

loadUsers();

</script>
</body>
</html>
