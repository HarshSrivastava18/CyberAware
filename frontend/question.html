<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questions</title>
    <style>
   * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #f4f6f9;
    padding: 30px;
}

/* Container */
.container {
    max-width: 1200px;
    margin: auto;
}

/* Form Card */
.form-card {
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    margin-bottom: 30px;
}

.form-card h2 {
    margin-bottom: 20px;
    color: #333;
}

.form-grid {
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 15px;
}

.form-grid textarea,
.form-grid input,
.form-grid select {
    width: 100%;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
}

.form-grid textarea {
    grid-column: span 2;
    min-height: 100px;
    resize: vertical;
}

.submit-btn {
    margin-top: 20px;
    background: #2563eb;
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
}

.submit-btn:hover {
    background: #1d4ed8;
}

/* Table */
.table-section {
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
}

.table-section h2 {
    margin-bottom: 20px;
}

.users-table {
    width: 100%;
    border-collapse: collapse;
}

.users-table th {
    background: #2563eb;
    color: white;
    padding: 12px;
    text-align: left;
}

.users-table td {
    padding: 12px;
    border-bottom: 1px solid #ddd;
}

.users-table tr:hover {
    background: #f8fafc;
}

/* Action Buttons */
.edit-btn {
    background: #f59e0b;
    color: white;
    border: none;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
}

.delete-btn {
    background: #dc2626;
    color: white;
    border: none;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
}

/* Modal */
.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 999;
}

.modal-content {
    background: white;
    width: 700px;
    max-width: 95%;
    margin: 40px auto;
    padding: 25px;
    border-radius: 12px;
    animation: slideDown .3s ease;
}

.modal-content h2 {
    margin-bottom: 20px;
}

.modal-content input {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
}

.modal-buttons {
    display: flex;
    gap: 10px;
}

.save-btn {
    background: #16a34a;
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 6px;
    cursor: pointer;
}

.cancel-btn {
    background: #6b7280;
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 6px;
    cursor: pointer;
}
.edit-btn {
    background: #f9ac40;
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    margin-right: 8px;
    transition: 0.3s;
}

.edit-btn:hover {
    background: #d97706;
    transform: translateY(-2px);
}

.delete-btn {
    background: #863737;
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.3s;
}

.delete-btn:hover {
    background: #dc2626;
    transform: translateY(-2px);
}

.setting-card {
    background: #ffffff;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    max-width: 450px;
    margin: 20px 0;
}

.setting-label {
    display: block;
    font-size: 16px;
    font-weight: 600;
    color: #333;
    margin-bottom: 12px;
}

.setting-group {
    display: flex;
    gap: 12px;
    align-items: center;
}

.setting-group input {
    flex: 1;
    height: 45px;
    padding: 0 15px;
    border: 1px solid #dcdcdc;
    border-radius: 8px;
    font-size: 15px;
    outline: none;
    transition: 0.3s;
}

.setting-group input:focus {
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
}

.setting-group button {
    height: 45px;
    padding: 0 20px;
    border: none;
    border-radius: 8px;
    background: #2563eb;
    color: white;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

.setting-group button:hover {
    background: #1d4ed8;
    transform: translateY(-1px);
}

.setting-group button:active {
    transform: translateY(0);
}

@keyframes slideDown {
    from {
        transform: translateY(-30px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}
    </style>
</head>

<body>
<div class="container">

    <div class="form-card">

        <h2>Add New Question</h2>

        <form id="questionForm">

            <div class="form-grid">

                <input type="text" id="section" placeholder="Section(MCQ/True/False)">

                <textarea id="question" placeholder="Question"></textarea>

                <input type="text" id="option1" placeholder="Option 1">
                <input type="text" id="option2" placeholder="Option 2">

                <input type="text" id="option3" placeholder="Option 3">
                <input type="text" id="option4" placeholder="Option 4">

                <input type="text" id="answer_index" placeholder="Correct Answer(Option no.)">

                <input type="text" id="category" placeholder="Category">

                <select id="difficulty">
                    <option>Beginner</option>
                    <option>Intermediate</option>
                    <option>Advanced</option>
                </select>

            </div>

            <button class="submit-btn" type="submit">
                Add Question
            </button>

        </form>

    </div>

</div>
        <!--question table-->
        <div class="table-section">

            <h2>Question Bank</h2>
          <div class="setting-card">
    <label for="questionLimit" class="setting-label">
        Quiz Question Limit
    </label>

    <div class="setting-group">
        <input
            type="number"
            id="questionLimit"
            min="1"
            placeholder="Enter limit"
        >

        <button onclick="saveLimit()">
            Save Limit
        </button>
    </div>
</div>

            <table class="users-table">

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Question</th>
                        <th>Category</th>
                        <th>Difficulty</th>
                        <th>Answer</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody id="questionsTableBody">
                </tbody>

            </table>

        </div>
    <div id="editModal" class="modal">

    <div class="modal-content">

        <h2>Edit Question</h2>

        <input type="hidden" id="editId">

        <input type="text" id="editQuestion" placeholder="Question">
        <input type="text" id="editOption1" placeholder="Option 1">
        <input type="text" id="editOption2" placeholder="Option 2">
        <input type="text" id="editOption3" placeholder="Option 3">
        <input type="text" id="editOption4" placeholder="Option 4">
        <input type="number" id="editAnswerIndex" placeholder="Answer Index">
        <input type="text" id="editCategory" placeholder="Category">
        <input type="text" id="editDifficulty" placeholder="Difficulty">

        <div class="modal-buttons">
            <button class="save-btn" onclick="saveQuestion()">
                Save Changes
            </button>

            <button class="cancel-btn" onclick="closeModal()">
                Cancel
            </button>
        </div>

    </div>

</div>

        <script>
            let allQuestions = [];
            document
                .getElementById("questionForm")
                .addEventListener("submit", async (e) => {

                    e.preventDefault();

                    const questionData = {
                        section:
                            document.getElementById("section").value,

                        question:
                            document.getElementById("question").value,

                        option1:
                            document.getElementById("option1").value,

                        option2:
                            document.getElementById("option2").value,

                        option3:
                            document.getElementById("option3").value,

                        option4:
                            document.getElementById("option4").value,

                        answer_index:
                            document.getElementById("answer_index").value,
                        category:
                            document.getElementById("category").value,

                        difficulty:
                            document.getElementById("difficulty").value

                    };
                    console.log(questionData);
                    const response = await fetch(
                        "https://cyberaware-vnpf.onrender.com/api/admin/questions",
                        {
                            method: "POST",
                            headers: {
                                "Content-Type":
                                    "application/json"
                            },
                            body:
                                JSON.stringify(questionData)
                        }
                    );

                    const data = await response.json();

                    alert(data.message);

                });

            async function loadQuestions() {


                try {

                    const response =
                        await fetch(
                            "https://cyberaware-vnpf.onrender.com/api/admin/questions"
                        );

                    const data =
                        await response.json();
                    allQuestions = data.questions;
                    const tbody =
                        document.getElementById(
                            "questionsTableBody"
                        );

                    tbody.innerHTML = "";

                   data.questions.forEach((q, index) => {

                        const options = [
                            q.option1,
                            q.option2,
                            q.option3,
                            q.option4
                        ];

                        const correctAnswer =
                            options[q.answer_index -1];

                        tbody.innerHTML += `
                <tr>

                    <td>${index + 1}</td>

                    <td>
                        ${q.question}
                    </td>

                    <td>
                        ${q.category}
                    </td>

                    <td>
                        ${q.difficulty}
                    </td>

                    <td>
                        ${correctAnswer}
                    </td>

                    <td>
                    <button class="edit-btn"
            onclick="editQuestion(${q.id})">
            ✏️ Edit
        </button>

        <button class="delete-btn"
            onclick="deleteQuestion(${q.id})">
            🗑️ Delete
        </button>

                    </td>

                </tr>
            `;
                    });

                } catch (error) {

                    console.error(error);
                }
            } loadQuestions();
            async function deleteQuestion(id) {

                if (
                    !confirm(
                        "Delete this question?"
                    )
                ) {
                    return;
                }

                try {

                    const response =
                        await fetch(
                            `https://cyberaware-vnpf.onrender.com/api/admin/questions/${id}`,
                            {
                                method: "DELETE"
                            }
                        );

                    const data =
                        await response.json();

                    alert(data.message);

                    loadQuestions();

                } catch (error) {

                    console.error(error);
                }
            }


           async function editQuestion(id) {

    const question =
        allQuestions.find(
            q => q.id == id
        );

    if (!question) return;

    document.getElementById("editModal").style.display = "block";

    document.getElementById("editId").value =
        question.id;

    document.getElementById("editQuestion").value =
        question.question;

    document.getElementById("editOption1").value =
        question.option1;

    document.getElementById("editOption2").value =
        question.option2;

    document.getElementById("editOption3").value =
        question.option3;

    document.getElementById("editOption4").value =
        question.option4;

    document.getElementById("editAnswerIndex").value =
        question.answer_index;

    document.getElementById("editCategory").value =
        question.category;

    document.getElementById("editDifficulty").value =
        question.difficulty;
};
            function closeModal() {

                document.getElementById(
                    "editModal"
                ).style.display = "none";
            }

            async function saveQuestion() {

                const id =
                    document.getElementById(
                        "editId"
                    ).value;

                const body = {

                    question:
                        document.getElementById(
                            "editQuestion"
                        ).value,

                    option1:
                        document.getElementById(
                            "editOption1"
                        ).value,

                    option2:
                        document.getElementById(
                            "editOption2"
                        ).value,

                    option3:
                        document.getElementById(
                            "editOption3"
                        ).value,

                    option4:
                        document.getElementById(
                            "editOption4"
                        ).value,

                    answer_index:
                        document.getElementById(
                            "editAnswerIndex"
                        ).value,

                    category:
                        document.getElementById(
                            "editCategory"
                        ).value,

                    difficulty:
                        document.getElementById(
                            "editDifficulty"
                        ).value
                };

                const response =
                    await fetch(
                        `https://cyberaware-vnpf.onrender.com/api/admin/questions/${id}`,
                        {
                            method: "PUT",

                            headers: {
                                "Content-Type":
                                    "application/json"
                            },

                            body:
                                JSON.stringify(body)
                        }
                    );

                const data =
                    await response.json();

                alert(data.message);

                closeModal();

                loadQuestions();
            }

            async function saveLimit() {
    const limit =
        document.getElementById("questionLimit").value;

    const response = await fetch(
        "https://cyberaware-vnpf.onrender.com/api/admin/settings/question-limit",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ limit })
        }
    );

    const data = await response.json();
    alert(data.message);
}
        </script>
</body>

</html>
